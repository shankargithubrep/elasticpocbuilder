[server]
# Increase timeout for long-running demo generation (15 minutes)
maxUploadSize = 200
fileWatcherType = "none"
# Timeout settings for long operations
enableXsrfProtection = false

# Session timeout: 30 minutes (in seconds)
# This prevents the UI from resetting during long demo generations
[browser]
serverAddress = "localhost"
gatherUsageStats = false

# Client-side timeout settings
[client]
showErrorDetails = true
toolbarMode = "minimal"
