# Dataset Schemas for Customer Brand Analytics Demo

datasets:
  brand_assets:
    description: "Core brand asset metadata and information"
    record_count: 289
    primary_key: "Asset ID"
    
    fields:
      - name: "Asset ID"
        type: keyword
        description: "Unique identifier for the asset"
        example: "BA-001"
        
      - name: "Asset Name"
        type: text
        description: "Descriptive name of the asset"
        example: "Summer Campaign Hero Image"
        
      - name: "Asset Type"
        type: keyword
        description: "Type/category of the asset"
        values:
          - Image
          - Video
          - Document
          - Graphic
          - Template
        distribution:
          Image: 35%
          Video: 25%
          Document: 15%
          Graphic: 15%
          Template: 10%
          
      - name: "Product Line"
        type: keyword
        description: "Customer product the asset relates to"
        values:
          - Photoshop
          - Illustrator
          - Premiere Pro
          - After Effects
          - XD
          - InDesign
          - Acrobat
          - Lightroom
        
      - name: "Region"
        type: keyword
        description: "Geographic region for the asset"
        values:
          - Americas
          - EMEA
          - APAC
          - Global
        distribution:
          Global: 40%
          Americas: 25%
          EMEA: 20%
          APAC: 15%
          
      - name: "Creative Format"
        type: keyword
        description: "Format or style of the creative"
        values:
          - Banner
          - Social Post
          - Email Header
          - Landing Page
          - Video Ad
          - Infographic
          - Presentation
          - Print Ad
          
      - name: "File Size"
        type: integer
        description: "File size in megabytes"
        range: "5 MB - 500 MB"
        
      - name: "Creator"
        type: keyword
        description: "Name of the person who created the asset"
        example: "John Smith"
        
      - name: "Status"
        type: keyword
        description: "Current status of the asset"
        values:
          - Active
          - Archived
          - In Review
        distribution:
          Active: 70%
          Archived: 20%
          In Review: 10%
          
      - name: "Created Date"
        type: date
        description: "When the asset was created"
        format: "YYYY-MM-DD"
        range: "2023-01-01 to 2024-09-30"
        
      - name: "Last Modified"
        type: date
        description: "When the asset was last updated"
        format: "YYYY-MM-DD"
        range: "Created Date to 2024-10-15"

  campaign_performance:
    description: "Marketing campaign performance metrics"
    record_count: 1157
    primary_key: null  # Multiple records per asset/campaign
    foreign_keys:
      - field: "Asset ID"
        references: "brand_assets.Asset ID"
        relationship: "many-to-one"
    
    fields:
      - name: "Asset ID"
        type: keyword
        description: "Links to brand_assets"
        example: "BA-001"
        
      - name: "Campaign Name"
        type: keyword
        description: "Name of the marketing campaign"
        example: "Q3 Product Launch"
        
      - name: "Channel"
        type: keyword
        description: "Marketing channel used"
        values:
          - Social Media
          - Email
          - Display Ads
          - Video Ads
          - Search
          - Landing Page
        distribution:
          Social Media: 30%
          Display Ads: 25%
          Email: 20%
          Video Ads: 15%
          Search: 5%
          Landing Page: 5%
          
      - name: "Impressions"
        type: long
        description: "Number of times ad was shown"
        range: "10,000 - 5,000,000"
        
      - name: "Clicks"
        type: long
        description: "Number of clicks received"
        range: "100 - 50,000"
        note: "Derived from impressions * random(0.5% - 5%)"
        
      - name: "Conversions"
        type: long
        description: "Number of conversions"
        range: "10 - 2,000"
        note: "Derived from clicks * random(1% - 10%)"
        
      - name: "Revenue"
        type: float
        description: "Revenue generated ($)"
        range: "$500 - $50,000"
        format: "dollars"
        
      - name: "Spend"
        type: float
        description: "Campaign spend ($)"
        range: "$500 - $20,000"
        format: "dollars"
        
      - name: "Engagement Rate"
        type: float
        description: "User engagement percentage"
        range: "0.5% - 8.0%"
        format: "percentage"
        note: "Higher for video and social media"
        
      - name: "Target Audience"
        type: keyword
        description: "Target demographic"
        values:
          - Creative Professionals
          - Students
          - Educators
          - Enterprise Teams
          - Small Business
          - Photographers
          - Video Editors
          
      - name: "Date"
        type: date
        description: "Campaign date"
        format: "YYYY-MM-DD"
        range: "2023-06-01 to 2024-09-30"

  usage_analytics:
    description: "Internal asset usage tracking"
    record_count: 2890
    primary_key: null  # Event log, no unique key
    foreign_keys:
      - field: "Asset ID"
        references: "brand_assets.Asset ID"
        relationship: "many-to-one"
    
    fields:
      - name: "Asset ID"
        type: keyword
        description: "Links to brand_assets"
        example: "BA-001"
        
      - name: "User"
        type: keyword
        description: "Name of user who performed action"
        example: "Jane Doe"
        
      - name: "Department"
        type: keyword
        description: "User's department"
        values:
          - Marketing
          - Sales
          - Product
          - Creative
          - Customer Success
          - Engineering
        distribution:
          Marketing: 40%
          Creative: 30%
          Sales: 15%
          Product: 10%
          Customer Success: 3%
          Engineering: 2%
          
      - name: "Action Type"
        type: keyword
        description: "Type of action performed"
        values:
          - Downloaded
          - Viewed
          - Approved
          - Edited
          - Shared
        distribution:
          Viewed: 40%
          Downloaded: 30%
          Shared: 15%
          Edited: 10%
          Approved: 5%
          
      - name: "Timestamp"
        type: date
        description: "When action occurred"
        format: "YYYY-MM-DDTHH:MM:SS"
        range: "2023-06-01 to 2024-10-15"
        
      - name: "Duration"
        type: integer
        description: "Duration in seconds (for Views)"
        range: "5 - 600"
        note: "Only populated for 'Viewed' actions"

relationships:
  - type: "one-to-many"
    from: "brand_assets.Asset ID"
    to: "campaign_performance.Asset ID"
    description: "Each asset can be used in multiple campaigns"
    
  - type: "one-to-many"
    from: "brand_assets.Asset ID"
    to: "usage_analytics.Asset ID"
    description: "Each asset can have multiple usage events"

notes:
  data_generation:
    - "Data is synthetically generated but follows realistic distributions"
    - "Relationships are maintained (all Asset IDs in campaign_performance and usage_analytics exist in brand_assets)"
    - "Timestamps are sequential and logical"
    - "Metrics follow realistic correlations (higher engagement = higher conversions)"
    
  indexing_tips:
    - "Use default field mappings for most fields"
    - "Ensure Asset ID is mapped as keyword (not text)"
    - "Date fields should be recognized as date type"
    - "Revenue and Spend should be float/double"
    
  query_considerations:
    - "Asset ID is the primary join key across all datasets"
    - "Use LOOKUP JOIN for combining datasets"
    - "Filter on Status='Active' when showing current assets"
    - "Date ranges should account for campaign vs usage timestamps"
